# fly.toml app configuration file generated for acube-cms-oudaga on 2026-07-12T08:23:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'acube-cms-oudaga'
primary_region = 'bom'

[build]

[[mounts]]
  source = 'strapi_data'
  destination = '/app/.tmp'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
